<!DOCTYPE html>
<html>
<head>

<title>Team Checker</title>

<style>

body{
font-family:Arial;
text-align:center;
background-image:url("https://i.pinimg.com/originals/a7/1a/91/a71a91530fb54c0787102936d6fa57cb.gif");
background-size:cover;
background-attachment:fixed;
}

nav{
background:#ffffffcc;
padding:15px;
}

nav a{
margin:15px;
text-decoration:none;
font-weight:bold;
color:#ff4fa3;
}

.card{
background:white;
width:420px;
margin:80px auto;
padding:30px;
border-radius:20px;
border:3px solid #ffd84d;
box-shadow:0 6px 15px gray;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(to right,#ffd84d,#ff9ecb);
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<nav>
<a href="index.html">Sign Up</a>
<a href="teamchecker.html">Team Checker</a>
<a href="players.html">Players</a>
</nav>

<div class="card">

<h2 style="color:#ff4fa3;">Intramurals Team Checker</h2>

<p>Did you register online?</p>

<input type="radio" name="reg" value="yes">Yes
<input type="radio" name="reg" value="no">No

<p>Do you have medical clearance?</p>

<input type="radio" name="med" value="yes">Yes
<input type="radio" name="med" value="no">No

<p>Grade Level</p>

<select id="grade">
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
</select>

<br><br>

<button onclick="check()">Check Eligibility</button>

<p id="result"></p>

</div>

<script>

function check(){

let reg=document.querySelector('input[name="reg"]:checked')
let med=document.querySelector('input[name="med"]:checked')
let grade=document.getElementById("grade").value
let result=document.getElementById("result")

if(!reg || !med){

result.innerHTML="Please answer all questions"

return

}

if(reg.value=="yes" && med.value=="yes" && grade<=10){

result.innerHTML="✅ You are Eligible for Intramurals!"

}

else{

result.innerHTML="❌ Not Eligible"

}

}

</script>

</body>
</html>
