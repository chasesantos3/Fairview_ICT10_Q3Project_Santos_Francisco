<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intrams Team Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background-image:url("https://i.pinimg.com/originals/a7/1a/91/a71a91530fb54c0787102936d6fa57cb.gif");
background-size:cover;
background-position:center;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.card-box{
background:rgba(255,255,255,0.95);
padding:35px;
border-radius:20px;
width:520px;

border:4px solid #ffd966;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

text-align:center;
}

h2{
color:#ff5fa2;
margin-bottom:20px;
}

.section-btn{
margin:6px;
border:none;
padding:10px 16px;
border-radius:20px;

background:linear-gradient(45deg,#ffd966,#ff8ac6);
font-weight:bold;

transition:0.2s;
}

.section-btn:hover{
transform:scale(1.05);
}

.result{
margin-top:25px;
font-size:20px;
font-weight:bold;
}

.team{
font-size:26px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card-box">

<h2>🏫 Check Your Intrams Team</h2>

<p>Click your section:</p>

<!-- ALL SECTIONS -->

<button class="section-btn" onclick="checkTeam('7 Ruby')">7 Ruby</button>
<button class="section-btn" onclick="checkTeam('7 Sapphire')">7 Sapphire</button>
<button class="section-btn" onclick="checkTeam('7 Emerald')">7 Emerald</button>
<button class="section-btn" onclick="checkTeam('7 Topaz')">7 Topaz</button>

<br>

<button class="section-btn" onclick="checkTeam('8 Emerald')">8 Emerald</button>
<button class="section-btn" onclick="checkTeam('8 Ruby')">8 Ruby</button>
<button class="section-btn" onclick="checkTeam('8 Topaz')">8 Topaz</button>
<button class="section-btn" onclick="checkTeam('8 Sapphire')">8 Sapphire</button>
<button class="section-btn" onclick="checkTeam('8 Jade')">8 Jade</button>

<br>

<button class="section-btn" onclick="checkTeam('9 Sapphire')">9 Sapphire</button>
<button class="section-btn" onclick="checkTeam('9 Topaz')">9 Topaz</button>
<button class="section-btn" onclick="checkTeam('9 Ruby')">9 Ruby</button>
<button class="section-btn" onclick="checkTeam('9 Jade')">9 Jade</button>
<button class="section-btn" onclick="checkTeam('9 Emerald')">9 Emerald</button>

<br>

<button class="section-btn" onclick="checkTeam('10 Sapphire')">10 Sapphire</button>
<button class="section-btn" onclick="checkTeam('10 Emerald')">10 Emerald</button>
<button class="section-btn" onclick="checkTeam('10 Topaz')">10 Topaz</button>
<button class="section-btn" onclick="checkTeam('10 Ruby')">10 Ruby</button>

<br>

<button class="section-btn" onclick="checkTeam('11 Luna')">11 Luna</button>
<button class="section-btn" onclick="checkTeam('11 Amorsolo')">11 Amorsolo</button>

<br>

<button class="section-btn" onclick="checkTeam('12 Tinio')">12 Tinio</button>
<button class="section-btn" onclick="checkTeam('12 Jose')">12 Jose</button>

<div id="result" class="result"></div>

</div>

<script>

function checkTeam(section){

const yellow = ["7 Ruby","8 Emerald","9 Sapphire","10 Sapphire","11 Luna"]
const red = ["7 Sapphire","8 Ruby","9 Topaz","10 Emerald","12 Tinio"]
const blue = ["7 Emerald","8 Topaz","8 Jade","9 Ruby","10 Topaz","12 Jose"]
const green = ["7 Topaz","8 Sapphire","9 Jade","9 Emerald","10 Ruby","11 Amorsolo"]

let output = ""

if(yellow.includes(section)){
output = "🐯 You are CLEARED for Intrams!<br><div class='team' style='color:#ffb300'>YELLOW TIGERS</div>"
}

else if(red.includes(section)){
output = "🐶 Your team is:<br><div class='team' style='color:red'>RED BULLDOGS</div>"
}

else if(blue.includes(section)){
output = "🐻 Your team is:<br><div class='team' style='color:blue'>BLUE BEARS</div>"
}

else if(green.includes(section)){
output = "🐝 Your team is:<br><div class='team' style='color:green'>GREEN HORNETS</div>"
}

document.getElementById("result").innerHTML = output

}

</script>

</body>
</html>
